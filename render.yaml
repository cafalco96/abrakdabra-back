services:
  - type: web
    name: abrakdabra
    env: docker
    plan: starter
    region: oregon
    envVars:
      - key: APP_NAME
        value: Abrakdabra
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        value: https://abrakdabra.onrender.com
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: abrakdabra-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: abrakdabra-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: abrakdabra-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: abrakdabra-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: abrakdabra-db
          property: password
      - key: CACHE_STORE
        value: database
      - key: SESSION_DRIVER
        value: database
      - key: QUEUE_CONNECTION
        value: database
      - key: LOG_CHANNEL
        value: stack
      - key: STRIPE_KEY
        sync: false
      - key: STRIPE_SECRET
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: MAIL_MAILER
        value: smtp
      - key: MAIL_HOST
        sync: false
      - key: MAIL_PORT
        sync: false
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_FROM_ADDRESS
        value: no-reply@abrakdabra.test
      - key: MAIL_FROM_NAME
        value: Abrakdabra Tickets
      - key: APP_TAX_RATE
        value: 0.15

databases:
  - name: abrakdabra-db
    databaseName: abrakdabra
    plan: starter
